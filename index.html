<!DOCTYPE html>

    <head>
        <meta charset="UTF-8">

        <script>
(function () {
    const oldPage = "https://www.hrjlhy.com/index_old.html";
    const ua = navigator.userAgent || "";

    const isIPhone = /iPhone|iPod/i.test(ua);
    const isAndroidPhone = /Android/i.test(ua) && /Mobile/i.test(ua);

    const params = new URLSearchParams(location.search);
    const forceNoWebGPU = params.has("noWebGPU");
    const forceNoGraphics = params.has("noGraphics");

    // 初始分享链接加载遮罩：只在 URL 自带 project 参数时显示
    const hasInitialPinnedProjectLink = params.has("project");

    if (hasInitialPinnedProjectLink) {
        document.documentElement.classList.add("deep-link-loading");
    }
    // 新增：测试现代版，不跳旧版
    const forceModern = params.has("modern");

    function goOld(reason) {
        console.warn(reason);

        // 如果带 ?modern，就不要跳旧版
        if (forceModern) {
            console.warn("Modern page forced by URL parameter");
            return;
        }

        window.location.replace(oldPage);
    }

    function hasGraphicsAcceleration() {
        try {
            const canvas = document.createElement("canvas");

            return !!(
                canvas.getContext("webgl2") ||
                canvas.getContext("webgl") ||
                canvas.getContext("experimental-webgl")
            );
        } catch (error) {
            return false;
        }
    }

    // mobile
    if (isIPhone || isAndroidPhone) {
        goOld("Phone detected");
        return;
    }

    // No graphics acceleration
    if (forceNoGraphics || !hasGraphicsAcceleration()) {
        goOld("No graphics acceleration available");

        // 如果 ?modern 阻止了跳转，就降级成 no-webgpu layout
        if (forceModern) {
            document.documentElement.classList.add("no-webgpu");
            window.__NO_WEBGPU__ = true;
        }

        return;
    }

    // No WebGPU
    if (forceNoWebGPU || !("gpu" in navigator)) {
        console.warn("Graphics acceleration available, but WebGPU unsupported");

        document.documentElement.classList.add("no-webgpu");
        window.__NO_WEBGPU__ = true;

        return;
    }
})();
</script>
